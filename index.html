<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños de hoy — Jorge Martínez</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --paper:#FBF3E7;
  --paper-2:#F3E9D8;
  --ink:#2B2118;
  --teal:#1F4B43;
  --teal-deep:#123128;
  --gold:#D9A441;
  --rose:#C1666B;
  --line:#D8C7AE;
  --card:#FFFEFB;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:60px;
}
::selection{background:var(--gold); color:var(--teal-deep);}
:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px;}

.wrap{max-width:640px; margin:0 auto; padding:0 18px;}

.postmark{
  background:var(--teal-deep);
  color:var(--paper);
  padding:26px 18px 34px;
  position:relative;
  overflow:hidden;
}
.postmark::after{
  content:"";
  position:absolute; left:0; right:0; bottom:-1px; height:16px;
  background:
    radial-gradient(circle at 8px 0, transparent 8px, var(--paper) 8.5px) repeat-x;
  background-size:16px 16px;
}
.postmark-top{display:flex; justify-content:space-between; align-items:flex-start;}
.postmark-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); opacity:.9;
}
.postmark h1{
  font-family:'Fraunces',serif; font-weight:600; font-size:32px;
  margin:6px 0 4px; letter-spacing:-.01em;
}
.postmark .date{
  font-family:'IBM Plex Mono',monospace; font-size:13px; opacity:.85;
}
.stamp{
  width:58px; height:58px; border-radius:50%;
  border:2px dashed rgba(251,243,231,.55);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
}
.stamp b{font-size:20px; line-height:1;}
.stamp span{font-size:8px; letter-spacing:.08em; opacity:.75; margin-top:2px;}

section{margin-top:26px;}
.section-label{
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:.12em; text-transform:uppercase; color:var(--teal);
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}
.section-label::after{content:""; flex:1; height:1px; background:var(--line);}

.empty{
  background:var(--card); border:1.5px dashed var(--line); border-radius:14px;
  padding:26px 20px; text-align:center; color:#7a6d5c; font-size:14px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px 20px 18px;
  margin-bottom:16px;
  position:relative;
  box-shadow:0 1px 0 var(--line), 0 8px 20px -14px rgba(43,33,24,.35);
  border:1px solid var(--line);
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
.card-name{font-family:'Fraunces',serif; font-size:21px; font-weight:600; margin:0;}
.card-sub{font-size:13px; color:#8a7c68; margin-top:2px;}
.age-stamp{
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  background:var(--gold); color:var(--teal-deep);
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:15px;
  border:2px solid var(--teal-deep);
}
.upcoming .age-stamp{background:var(--paper-2); color:var(--teal); border-color:var(--line);}

.lang-toggle{
  display:inline-flex; margin-top:12px; border:1.5px solid var(--teal); border-radius:999px; overflow:hidden;
}
.lang-toggle button{
  border:none; background:transparent; font-family:'Inter',sans-serif; font-weight:600;
  font-size:12px; padding:6px 14px; cursor:pointer; color:var(--teal);
}
.lang-toggle button.active{background:var(--teal); color:var(--paper);}

.msg-box{
  width:100%; margin-top:12px; border:1px solid var(--line); border-radius:10px;
  background:var(--paper); padding:12px 13px; font-family:'Inter',sans-serif; font-size:13.5px;
  line-height:1.5; color:var(--ink); resize:vertical; min-height:96px;
}

.meta-row{display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; font-size:12.5px; color:#6d6153;}
.meta-row a{color:var(--teal); text-decoration:none; font-weight:600;}
.meta-row a:hover{text-decoration:underline;}

.actions{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
.btn{
  border:none; border-radius:9px; padding:10px 14px; font-weight:700; font-size:13px;
  cursor:pointer; font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px;
  transition:transform .12s ease; text-decoration:none;
}
.btn:active{transform:scale(.97);}
.btn-sms{background:var(--teal-deep); color:var(--paper);}
.btn-share-sms{background:var(--rose); color:#fff;}
.btn-share-wa{background:#3CA070; color:#fff;}
.btn-copy{background:transparent; color:var(--teal); border:1.5px solid var(--teal);}
.btn-map{background:var(--gold); color:var(--teal-deep);}
.hint{font-size:11px; color:#8a7c68; margin-top:6px; width:100%;}

.dir-row{
  display:flex; justify-content:space-between; align-items:center; padding:9px 4px;
  border-bottom:1px solid var(--paper-2); font-size:13px; gap:8px; cursor:pointer;
}
.dir-row:hover{background:var(--paper-2);}
.dir-row .who{font-weight:600;}
.dir-row .sub{color:#8a7c68; font-size:11.5px;}
.dir-del{background:none; border:none; color:var(--rose); font-size:11.5px; font-weight:700; cursor:pointer;}
.dir-scroll{max-height:320px; overflow-y:auto;}

.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(43,33,24,.5);
  align-items:flex-end; justify-content:center; z-index:100; backdrop-filter:blur(2px);
}
.modal-overlay.show{display:flex;}
.modal-card{
  background:var(--card); width:100%; max-width:640px; border-radius:20px 20px 0 0;
  padding:22px 20px 28px; max-height:85vh; overflow-y:auto;
  box-shadow:0 -8px 30px rgba(43,33,24,.3);
}
.modal-close{
  float:right; background:none; border:none; font-size:20px; color:#8a7c68; cursor:pointer; line-height:1;
}
.modal-name{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:0 0 4px;}
.modal-field{display:flex; flex-direction:column; gap:2px; margin-top:14px;}
.modal-field label{font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#8a7c68; font-weight:700;}
.modal-field span{font-size:14.5px; color:var(--ink);}

.upcoming-list{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;}
.upcoming-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-bottom:1px solid var(--paper-2); gap:10px; cursor:pointer;
}
.upcoming-row:hover{background:var(--paper-2);}
.upcoming-row:last-child{border-bottom:none;}
.upcoming-row .who{font-weight:600; font-size:14px;}
.upcoming-row .when{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8a7c68;}

.photo-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.photo-box{
  background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;
  display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center;
}
.photo-preview{
  width:100%; aspect-ratio:2/3; border-radius:10px; object-fit:cover; border:1px solid var(--line);
  background:var(--paper-2);
}
.photo-label{font-family:'Fraunces',serif; font-weight:600; font-size:14px;}
.upload-btn{
  background:var(--teal); color:var(--paper); border:none; border-radius:9px; padding:8px 12px;
  font-weight:700; font-size:12px; cursor:pointer; width:100%;
}

details{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:4px 16px;}
summary{
  cursor:pointer; padding:14px 0; font-family:'Fraunces',serif; font-weight:600; font-size:16px;
  list-style:none; display:flex; align-items:center; justify-content:space-between;
}
summary::-webkit-details-marker{display:none;}
summary::after{content:"+"; font-size:20px; color:var(--teal); font-weight:400;}
details[open] summary::after{content:"–";}

.search-input{
  width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:13.5px;
  font-family:'Inter',sans-serif; background:var(--card); margin-bottom:10px;
}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--teal-deep); color:var(--paper); padding:11px 20px; border-radius:999px;
  font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s ease, bottom .25s ease;
  font-family:'Inter',sans-serif; z-index:50; max-width:88vw; text-align:center; white-space:normal;
}
.toast.show{opacity:1; bottom:32px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

const MESSAGES = {
  es: (name) => `¡Feliz cumpleaños, ${name}! 🎉 Le deseo un día lleno de salud, alegría y muchas bendiciones. Gracias por confiar en mí y permitirme ser parte de lo que más importa: su tranquilidad y la de su familia. Estoy para sus servicios si usted, su familia o alguien que conoce necesita información sobre nuestros planes — Jorge Martínez, 310-560-6211. ¡Que lo disfrute al máximo!`,
  en: (name) => `Happy birthday, ${name}! 🎉 Wishing you a day filled with health, joy and many blessings. Thank you for trusting me and letting me be part of what matters most: your peace of mind and your family's well-being. I'm here for you if you, your family, or someone you know needs information about our plans — Jorge Martínez, 310-560-6211. Enjoy your day to the fullest!`
};

let clients = [];
let cardLang = {};

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function digitsOnly(p){ return (p||'').replace(/\D/g,''); }
function toE164(p){ let d = digitsOnly(p); if(d.length===10) d = '1'+d; return d ? '+'+d : ''; }
function toWaNumber(p){ let d = digitsOnly(p); if(d.length===10) d = '1'+d; return d; }

function parseBirth(b){
  const [y,m,d] = b.split('-').map(Number);
  return {y,m,d};
}
function nextOccurrence(m,d, from){
  let year = from.getFullYear();
  let dt = new Date(year, m-1, d);
  if(dt < stripTime(from)) dt = new Date(year+1, m-1, d);
  return dt;
}
function stripTime(dt){ return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function daysBetween(a,b){ return Math.round((stripTime(b)-stripTime(a))/86400000); }

function loadClients(){
  try{
    const raw = localStorage.getItem('clients');
    clients = raw ? JSON.parse(raw) : SEED;
    if(!raw) localStorage.setItem('clients', JSON.stringify(clients));
  }catch(e){
    clients = SEED;
  }
}
function saveClients(){
  try{ localStorage.setItem('clients', JSON.stringify(clients)); }
  catch(e){ toast('No se pudo guardar (memoria del navegador llena)'); }
}

function getPhoto(lang){
  const key = lang === 'en' ? 'photo_en' : 'photo_es';
  try{
    const val = localStorage.getItem(key);
    if(val) return val;
  }catch(e){}
  return lang === 'en' ? DEFAULT_PHOTO_EN : DEFAULT_PHOTO_ES;
}

function loadPhotos(){
  document.getElementById('photoPreviewEs').src = getPhoto('es');
  document.getElementById('photoPreviewEn').src = getPhoto('en');
}

function dataURLtoFile(dataurl, filename){
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

function mapsUrl(addr){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr);
}

function renderCard(person, isToday, age, dayLabel){
  const lang = cardLang[person.id] || person.lang || 'es';
  const message = MESSAGES[lang](person.name.split(' ')[0]);
  const wrap = document.createElement('div');
  wrap.className = 'card' + (isToday ? '' : ' upcoming');
  wrap.innerHTML = `
    <div class="card-top">
      <div>
        <p class="card-name">${person.name}</p>
        <div class="card-sub">${isToday ? 'Cumple ' + age + ' años hoy' : dayLabel}</div>
      </div>
      <div class="age-stamp">${age}</div>
    </div>
    <div class="lang-toggle">
      <button data-lang="es" class="${lang==='es'?'active':''}">ES</button>
      <button data-lang="en" class="${lang==='en'?'active':''}">EN</button>
    </div>
    <textarea class="msg-box">${message}</textarea>
    <div class="meta-row">
      ${person.phone ? `<span>📞 ${person.phone}</span>` : '<span>Sin teléfono</span>'}
    </div>
    <div class="actions">
      <button class="btn btn-share-sms">📱 SMS con tarjeta</button>
      <button class="btn btn-share-wa">💬 WhatsApp con tarjeta</button>
      ${person.addr ? `<a class="btn btn-map" href="${mapsUrl(person.addr)}" target="_blank" rel="noopener">📍 Mapa</a>` : ''}
      <button class="btn btn-copy">Copiar mensaje</button>
      <div class="hint">Al tocar un botón se copia el número automáticamente y se abre el menú para compartir la foto y el mensaje juntos — solo pega el número en "Para:" y envía (el celular no deja prellenar el destinatario junto con una imagen).</div>
    </div>
  `;

  const textarea = wrap.querySelector('.msg-box');

  wrap.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.addEventListener('click', ()=>{
      cardLang[person.id] = b.dataset.lang;
      wrap.querySelectorAll('.lang-toggle button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      textarea.value = MESSAGES[b.dataset.lang](person.name.split(' ')[0]);
    });
  });

  wrap.querySelector('.btn-copy').addEventListener('click', async ()=>{
    try{ await navigator.clipboard.writeText(textarea.value); toast('Mensaje copiado'); }
    catch(e){ toast('No se pudo copiar'); }
  });

  async function shareWithCard(fallbackChannel){
    const currentLang = cardLang[person.id] || person.lang || 'es';
    const rawNum = fallbackChannel === 'sms' ? toE164(person.phone) : toWaNumber(person.phone);
    if(!rawNum){ toast('Sin teléfono guardado'); return; }

    let shared = false;
    try{
      const photoData = getPhoto(currentLang);
      if(photoData && navigator.canShare){
        const file = dataURLtoFile(photoData, 'feliz-cumpleanos.jpg');
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], text: textarea.value, title:'Feliz cumpleaños'});
          shared = true;
        }
      }
    }catch(e){ /* cancelado o no disponible, sigue al respaldo */ }

    if(shared){
      try{
        await navigator.clipboard.writeText(person.phone || rawNum);
        toast(`✅ Enviado al panel — número copiado (${person.phone || rawNum}), pégalo en "Para:"`);
      }catch(e){
        toast('Tarjeta enviada al panel de compartir');
      }
    }else{
      try{ await navigator.clipboard.writeText(textarea.value); }catch(e){}
      if(fallbackChannel === 'sms'){
        toast('Este navegador no comparte fotos — mensaje copiado, pégalo y adjunta la tarjeta en Mensajes');
        window.location.href = `sms:${rawNum}&body=${encodeURIComponent(textarea.value)}`;
      }else{
        toast('Este navegador no comparte fotos — mensaje copiado, pégalo y adjunta la tarjeta en WhatsApp');
        window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(textarea.value)}`, '_blank');
      }
    }
  }
  wrap.querySelector('.btn-share-sms').addEventListener('click', ()=> shareWithCard('sms'));
  wrap.querySelector('.btn-share-wa').addEventListener('click', ()=> shareWithCard('wa'));

  return wrap;
}

function render(){
  const today = stripTime(new Date());
  document.getElementById('todayLabel').textContent = today.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});

  const todayList = document.getElementById('todayList');
  const upcomingList = document.getElementById('upcomingList');
  todayList.innerHTML = '';
  upcomingList.innerHTML = '';

  const withNext = clients.filter(c=>c.birth).map(c=>{
    const {y,m,d} = parseBirth(c.birth);
    const next = nextOccurrence(m,d, today);
    const days = daysBetween(today, next);
    const age = next.getFullYear() - y;
    return {...c, days, age};
  }).sort((a,b)=>a.days-b.days);

  const todays = withNext.filter(c=>c.days===0);
  const upcoming = withNext.filter(c=>c.days>0 && c.days<=7);

  document.getElementById('todayCount').textContent = todays.length;

  if(todays.length===0){
    todayList.innerHTML = '<div class="empty">Nadie cumple años hoy. Revisa "Próximos 7 días" para prepararte con tiempo.</div>';
  }else{
    todays.forEach(p=> todayList.appendChild(renderCard(p, true, p.age, '')));
  }

  if(upcoming.length===0){
    upcomingList.innerHTML = '<div class="upcoming-row"><span class="who">Sin cumpleaños próximos</span></div>';
  }else{
    upcoming.forEach(p=>{
      const row = document.createElement('div');
      row.className = 'upcoming-row';
      const dayLabel = p.days===1 ? 'Mañana' : `En ${p.days} días`;
      row.innerHTML = `<span class="who">${p.name}</span><span class="when">${dayLabel} · cumple ${p.age}</span>`;
      row.addEventListener('click', ()=> openClientModal(p));
      upcomingList.appendChild(row);
    });
  }

  renderDirectory(document.getElementById('searchInput').value);
}

function renderDirectory(filter=''){
  const dir = document.getElementById('dirList');
  dir.innerHTML = '';
  document.getElementById('dirCount').textContent = clients.length;
  const q = filter.trim().toLowerCase();
  const list = clients.filter(c=>!q || c.name.toLowerCase().includes(q)).slice(0,150);
  list.forEach(c=>{
    const row = document.createElement('div');
    row.className = 'dir-row';
    row.innerHTML = `<div><div class="who">${c.name}</div><div class="sub">${c.phone||'sin teléfono'} · ${c.birth||'sin fecha'}</div></div><button class="dir-del">Eliminar</button>`;
    row.addEventListener('click', ()=> openClientModal(c));
    row.querySelector('.dir-del').addEventListener('click', (e)=>{
      e.stopPropagation();
      clients = clients.filter(x=>x.id!==c.id);
      saveClients();
      render();
    });
    dir.appendChild(row);
  });
}

function openClientModal(c){
  const overlay = document.getElementById('clientModalOverlay');
  const card = document.getElementById('clientModalCard');
  const langLabel = c.lang === 'en' ? 'English' : 'Español';
  card.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <p class="modal-name">${c.name}</p>
    <div class="modal-field"><label>Teléfono</label><span>${c.phone || 'Sin teléfono'}</span></div>
    <div class="modal-field"><label>Fecha de nacimiento</label><span>${c.birth || 'Sin fecha'}</span></div>
    <div class="modal-field"><label>Idioma</label><span>${langLabel}</span></div>
    <div class="modal-field"><label>Dirección</label><span>${c.addr || 'Sin dirección'}</span></div>
    <div class="actions" style="margin-top:18px;">
      <button class="btn btn-share-sms" id="modalShareSms">📱 SMS con tarjeta</button>
      <button class="btn btn-share-wa" id="modalShareWa">💬 WhatsApp con tarjeta</button>
      ${c.addr ? `<a class="btn btn-map" href="${mapsUrl(c.addr)}" target="_blank" rel="noopener">📍 Mapa</a>` : ''}
    </div>
  `;
  const lang = c.lang === 'en' ? 'en' : 'es';
  const message = MESSAGES[lang](c.name.split(' ')[0]);
  card.querySelector('#modalCloseBtn').addEventListener('click', closeClientModal);
  async function modalShareWithCard(fallbackChannel){
    const rawNum = fallbackChannel === 'sms' ? toE164(c.phone) : toWaNumber(c.phone);
    if(!rawNum){ toast('Sin teléfono guardado'); return; }

    let shared = false;
    try{
      const photoData = getPhoto(lang);
      if(photoData && navigator.canShare){
        const file = dataURLtoFile(photoData, 'feliz-cumpleanos.jpg');
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], text: message, title:'Feliz cumpleaños'});
          shared = true;
        }
      }
    }catch(e){ /* cancelado o no disponible, sigue al respaldo */ }

    if(shared){
      try{
        await navigator.clipboard.writeText(c.phone || rawNum);
        toast(`✅ Enviado al panel — número copiado (${c.phone || rawNum}), pégalo en "Para:"`);
      }catch(e){
        toast('Tarjeta enviada al panel de compartir');
      }
    }else{
      try{ await navigator.clipboard.writeText(message); }catch(e){}
      if(fallbackChannel === 'sms'){
        toast('Este navegador no comparte fotos — mensaje copiado, pégalo y adjunta la tarjeta en Mensajes');
        window.location.href = `sms:${rawNum}&body=${encodeURIComponent(message)}`;
      }else{
        toast('Este navegador no comparte fotos — mensaje copiado, pégalo y adjunta la tarjeta en WhatsApp');
        window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(message)}`, '_blank');
      }
    }
  }
  card.querySelector('#modalShareSms').addEventListener('click', ()=> modalShareWithCard('sms'));
  card.querySelector('#modalShareWa').addEventListener('click', ()=> modalShareWithCard('wa'));
  overlay.classList.add('show');
}
function closeClientModal(){
  document.getElementById('clientModalOverlay').classList.remove('show');
}
document.getElementById('clientModalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'clientModalOverlay') closeClientModal();
});

document.getElementById('searchInput').addEventListener('input', (e)=> renderDirectory(e.target.value));

function wireUpload(btnId, inputId, storageKey, previewId){
  document.getElementById(btnId).addEventListener('click', ()=> document.getElementById(inputId).click());
  document.getElementById(inputId).addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        localStorage.setItem(storageKey, reader.result);
        toast('Tarjeta actualizada');
      }catch(e){
        toast('La foto es muy pesada para guardarla en el navegador — prueba una más liviana');
      }
      document.getElementById(previewId).src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
wireUpload('uploadBtnEs','photoInputEs','photo_es','photoPreviewEs');
wireUpload('uploadBtnEn','photoInputEn','photo_en','photoPreviewEn');

window.addEventListener('error', (e)=>{
  const banner = document.getElementById('errorBanner');
  if(banner){
    banner.style.display = 'block';
    banner.textContent = 'Hubo un error cargando la app: ' + (e.message || 'desconocido') + '.';
  }
});

(function init(){
  try{
    loadClients();
    loadPhotos();
    render();
  }catch(err){
    const banner = document.getElementById('errorBanner');
    if(banner){
      banner.style.display = 'block';
      banner.textContent = 'Hubo un error cargando la app: ' + (err && err.message ? err.message : err);
    }
  }
})();
</script>
