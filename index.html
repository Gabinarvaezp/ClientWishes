<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños de hoy — Jorge Martínez</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');


:root{
  --paper:#FBF3E7;
  --paper-2:#F3E9D8;
  --ink:#2B2118;
  --teal:#1F4B43;
  --teal-deep:#123128;
  --teal-light:#2E6459;
  --gold:#D9A441;
  --gold-light:#E8C179;
  --rose:#C1666B;
  --line:#E1D3BA;
  --card:#FFFEFB;
  --shadow-sm:0 1px 2px rgba(43,33,24,.06);
  --shadow-md:0 10px 24px -16px rgba(43,33,24,.4), 0 2px 6px -2px rgba(43,33,24,.08);
  --shadow-lg:0 20px 40px -20px rgba(18,49,40,.35);
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:
    radial-gradient(circle at 8% 0%, rgba(217,164,65,.08), transparent 40%),
    var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:60px;
}
::selection{background:var(--gold); color:var(--teal-deep);}
:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px;}

.wrap{max-width:640px; margin:0 auto; padding:0 18px;}

.postmark{
  background:linear-gradient(165deg, var(--teal-deep) 0%, #0E2820 100%);
  color:var(--paper);
  padding:28px 18px 36px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.postmark::before{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(circle at 92% 8%, rgba(217,164,65,.18), transparent 55%);
  pointer-events:none;
}
.postmark::after{
  content:"";
  position:absolute; left:0; right:0; bottom:-1px; height:16px;
  background:
    radial-gradient(circle at 8px 0, transparent 8px, var(--paper) 8.5px) repeat-x;
  background-size:16px 16px;
}
.postmark-top{display:flex; justify-content:space-between; align-items:flex-start; position:relative; z-index:1;}
.postmark-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--gold-light); opacity:.95; font-weight:600;
}
.postmark h1{
  font-family:'Fraunces',serif; font-weight:600; font-size:33px;
  margin:8px 0 5px; letter-spacing:-.015em;
}
.postmark .date{
  font-family:'IBM Plex Mono',monospace; font-size:13px; opacity:.85;
  text-transform:capitalize;
}
.stamp{
  width:60px; height:60px; border-radius:50%;
  border:2px dashed rgba(232,193,121,.5);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
  background:rgba(232,193,121,.06);
}
.stamp b{font-size:21px; line-height:1; color:var(--gold-light);}
.stamp span{font-size:8px; letter-spacing:.1em; opacity:.8; margin-top:3px;}

section{margin-top:28px;}
.section-label{
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--teal);
  display:flex; align-items:center; gap:8px; margin-bottom:13px; font-weight:600;
}
.section-label::after{content:""; flex:1; height:1px; background:linear-gradient(90deg, var(--line), transparent);}

.empty{
  background:var(--card); border:1.5px dashed var(--line); border-radius:16px;
  padding:28px 20px; text-align:center; color:#8a7c68; font-size:14px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:22px 22px 20px;
  margin-bottom:16px;
  position:relative;
  box-shadow:var(--shadow-md);
  border:1px solid var(--line);
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
.card-name{font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin:0; letter-spacing:-.01em;}
.card-sub{font-size:13px; color:#8a7c68; margin-top:3px; font-weight:500;}
.age-stamp{
  width:46px; height:46px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(155deg, var(--gold-light), var(--gold));
  color:var(--teal-deep);
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px;
  border:2px solid var(--teal-deep);
  box-shadow:var(--shadow-sm);
}
.upcoming .age-stamp{background:var(--paper-2); color:var(--teal); border-color:var(--line);}
.upcoming{box-shadow:var(--shadow-sm);}

.lang-toggle{
  display:inline-flex; margin-top:13px; border:1.5px solid var(--teal); border-radius:999px; overflow:hidden;
}
.lang-toggle button{
  border:none; background:transparent; font-family:'Inter',sans-serif; font-weight:700;
  font-size:11.5px; padding:6px 15px; cursor:pointer; color:var(--teal); letter-spacing:.02em;
}
.lang-toggle button.active{background:var(--teal); color:var(--paper);}

.msg-box{
  width:100%; margin-top:13px; border:1px solid var(--line); border-radius:12px;
  background:var(--paper); padding:13px 14px; font-family:'Inter',sans-serif; font-size:13.5px;
  line-height:1.55; color:var(--ink); resize:vertical; min-height:96px;
}
.msg-box:focus{border-color:var(--teal);}

.meta-row{display:flex; flex-wrap:wrap; gap:14px; margin-top:12px; font-size:12.5px; color:#6d6153; font-weight:500;}
.meta-row a{color:var(--teal); text-decoration:none; font-weight:600;}
.meta-row a:hover{text-decoration:underline;}

.review-warning{
  background:#FCEFE3; border:1px solid var(--rose); border-radius:9px;
  padding:6px 10px; margin-top:10px; font-size:10.5px; color:#7A3B3F;
  display:flex; gap:6px; align-items:baseline; line-height:1.35;
}
.review-warning b{color:var(--rose); font-size:10.5px;}
.review-warning .icon{flex-shrink:0; font-size:11px;}

.policy-toggle{
  margin-top:12px; background:var(--paper-2); border:1px solid var(--line); border-radius:14px;
  overflow:hidden;
}
.policy-toggle summary{
  padding:10px 14px; font-family:'Fraunces',serif; font-weight:600; font-size:13.5px;
  color:var(--teal-deep); cursor:pointer; list-style:none; display:flex; align-items:center;
  gap:8px;
}
.policy-toggle summary .count-pill{
  font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; color:var(--paper);
  background:var(--teal); border-radius:999px; padding:2px 9px;
}
.policy-toggle summary::-webkit-details-marker{display:none;}
.policy-toggle summary::after{content:"▾"; color:var(--teal); font-size:11px; margin-left:auto; flex-shrink:0;}
.policy-toggle[open] summary::after{content:"▴";}
.policy-list{padding:0 10px 10px; display:flex; flex-direction:column; gap:6px;}
.policy-item{
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  display:flex; align-items:stretch; overflow:hidden;
}
.policy-item-row{
  flex-shrink:0; width:44px; display:flex; flex-direction:column; align-items:center;
  justify-content:center; background:var(--teal-deep); color:var(--gold-light);
  font-family:'IBM Plex Mono',monospace; padding:6px 4px;
}
.policy-item-row b{font-size:15px; line-height:1;}
.policy-item-row span{font-size:7.5px; letter-spacing:.05em; text-transform:uppercase; opacity:.85; margin-top:2px;}
.policy-item-body{padding:8px 11px; flex:1; min-width:0;}
.policy-item-top{
  display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:6px;
}
.policy-item-type{font-weight:700; font-size:12px; color:var(--teal-deep); line-height:1.3;}
.policy-item-quota{
  flex-shrink:0; font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px;
  color:var(--teal);
}
.policy-item-quota span{font-size:9px; color:#a3927a; font-weight:600; text-transform:uppercase; display:block; text-align:right;}
.policy-item-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; font-size:11.5px;
}
.policy-item-grid label{
  display:inline; font-size:9px; letter-spacing:.04em; text-transform:uppercase;
  color:#a3927a; font-weight:700; margin-right:4px;
}
.policy-item-grid span{color:var(--ink); font-weight:500;}
.manual-note{
  margin-top:12px; background:var(--paper-2); border:1px solid var(--line); border-radius:12px;
  padding:10px 13px; font-size:12px; color:#6d6153; font-weight:500;
}

.actions{display:flex; flex-wrap:wrap; gap:8px; margin-top:15px;}
.btn{
  border:none; border-radius:10px; padding:10px 15px; font-weight:700; font-size:13px;
  cursor:pointer; font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px;
  transition:transform .12s ease, box-shadow .12s ease; text-decoration:none;
  box-shadow:var(--shadow-sm);
}
.btn:active{transform:scale(.96);}
.btn-sms{background:var(--teal-deep); color:var(--paper);}
.btn-share-sms{background:var(--rose); color:#fff;}
.btn-share-wa{background:#3CA070; color:#fff;}
.btn-copy{background:transparent; color:var(--teal); border:1.5px solid var(--teal); box-shadow:none;}
.btn-map{background:linear-gradient(155deg, var(--gold-light), var(--gold)); color:var(--teal-deep);}
.hint{font-size:11px; color:#8a7c68; margin-top:8px; width:100%; line-height:1.5;}

.dir-row{
  display:flex; justify-content:space-between; align-items:center; padding:11px 6px;
  border-bottom:1px solid var(--paper-2); font-size:13px; gap:8px; cursor:pointer;
  border-radius:8px; transition:background .12s ease;
}
.dir-row:hover{background:var(--paper-2);}
.dir-row .who{font-weight:600;}
.dir-row .sub{color:#8a7c68; font-size:11.5px; margin-top:1px;}
.dir-del{background:none; border:none; color:var(--rose); font-size:11.5px; font-weight:700; cursor:pointer; padding:4px 8px;}
.dir-scroll{max-height:340px; overflow-y:auto;}

.modal-overlay{
  display:none; position:fixed; inset:0; background:rgba(18,49,40,.55);
  align-items:flex-end; justify-content:center; z-index:100; backdrop-filter:blur(3px);
}
.modal-overlay.show{display:flex;}
.modal-card{
  background:var(--card); width:100%; max-width:640px; border-radius:22px 22px 0 0;
  padding:24px 22px 30px; max-height:88vh; overflow-y:auto;
  box-shadow:0 -12px 40px rgba(18,49,40,.35);
}
.modal-close{
  float:right; background:var(--paper-2); border:none; width:30px; height:30px; border-radius:50%;
  font-size:16px; color:#8a7c68; cursor:pointer; line-height:1;
}
.modal-name{font-family:'Fraunces',serif; font-weight:600; font-size:23px; margin:4px 0 4px; letter-spacing:-.01em;}
.modal-field{display:flex; flex-direction:column; gap:2px; margin-top:14px;}
.modal-field label{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:#8a7c68; font-weight:700;}
.modal-field span{font-size:14.5px; color:var(--ink);}

.upcoming-list{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow-sm);}
.upcoming-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 16px; border-bottom:1px solid var(--paper-2); gap:10px; cursor:pointer;
  transition:background .12s ease;
}
.upcoming-row:hover{background:var(--paper-2);}
.upcoming-row:last-child{border-bottom:none;}
.upcoming-row .who{font-weight:600; font-size:14px;}
.upcoming-row .when{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8a7c68;}

.outreach-card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:13px 15px; margin-bottom:10px; box-shadow:var(--shadow-sm);
}
.outreach-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
.outreach-name{font-family:'Fraunces',serif; font-weight:600; font-size:15.5px;}
.outreach-sub{font-size:11.5px; color:#8a7c68; margin-top:1px;}
.outreach-actions{display:flex; gap:8px; margin-top:10px;}
.outreach-actions .btn{padding:8px 13px; font-size:12px;}

.photo-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.photo-box{
  background:var(--card); border:1px solid var(--line); border-radius:16px; padding:15px;
  display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center;
  box-shadow:var(--shadow-sm);
}
.photo-preview{
  width:100%; aspect-ratio:4/5; border-radius:11px; object-fit:cover; border:1px solid var(--line);
  background:var(--paper-2);
}
.photo-label{font-family:'Fraunces',serif; font-weight:600; font-size:14px;}
.upload-btn{
  background:var(--teal); color:var(--paper); border:none; border-radius:10px; padding:9px 12px;
  font-weight:700; font-size:12px; cursor:pointer; width:100%;
}

details{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:4px 17px; box-shadow:var(--shadow-sm);}
summary{
  cursor:pointer; padding:15px 0; font-family:'Fraunces',serif; font-weight:600; font-size:16px;
  list-style:none; display:flex; align-items:center; justify-content:space-between;
}
summary::-webkit-details-marker{display:none;}
summary::after{content:"+"; font-size:20px; color:var(--teal); font-weight:400;}
details[open] summary::after{content:"–";}

.search-input{
  width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:13.5px;
  font-family:'Inter',sans-serif; background:var(--card); margin-bottom:10px;
}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--teal-deep); color:var(--paper); padding:12px 22px; border-radius:999px;
  font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s ease, bottom .25s ease;
  font-family:'Inter',sans-serif; z-index:50; max-width:88vw; text-align:center; white-space:normal;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1; bottom:32px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

<div class="postmark">
  <div class="wrap postmark-top">
    <div>
      <div class="postmark-eyebrow">Lincoln Heritage · Agente Jorge Martínez</div>
      <h1>Cumpleaños de hoy</h1>
      <div class="date" id="todayLabel">—</div>

    <div class="stamp"><b id="todayCount">0</b><span>HOY</span></div>

      </div>
    </div>
  </section>

  <section>
    <div class="section-label">Hoy</div>
    <div id="todayList"></div>
  </section>

  <section>
    <div class="section-label">Próximos 7 días</div>
    <div class="upcoming-list" id="upcomingList"></div>
  </section>

  <section>
    <div class="section-label">Seguimiento personalizado — hoy te toca escribirle a</div>
    <div id="outreachList"></div>
  </section>

  <section>
    <details>
      <summary>Buscar en la lista de clientes (<span id="dirCount">0</span>)</summary>
      <div style="padding-bottom:16px;">
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nombre...">
        <div class="dir-scroll" id="dirList"></div>
      </div>
    </details>
  </section>

</div>

<div class="modal-overlay" id="clientModalOverlay">
  <div class="modal-card" id="clientModalCard"></div>
</div>

<div class="toast" id="toast"></div>

const CHECKIN_MESSAGES = {
  es: (name, city) => `Hola ${name.split(' ')[0]}, soy Jorge Martínez, su agente. Voy a estar por ${city} esta semana y me encantaría pasar a saludarlo un momento y ver cómo está usted y su familia. ¿Le queda bien que coordinemos un día? 310-560-6211`,
  en: (name, city) => `Hi ${name.split(' ')[0]}, this is Jorge Martínez, your agent. I'll be in the ${city} area this week and would love to stop by and say hello and see how you and your family are doing. Would a quick visit work for you? 310-560-6211`
};

function pickDailyOutreach(){
  const batches = OUTREACH_BATCHES;
  if(!batches.length) return [];
  // "Hoy" (el día que se usa por primera vez la app) es el día 1 del recorrido,
  // así siempre arranca por los de mayor puntaje — nunca se reinicia solo,
  // y nunca salta al final de la lista por accidente.
  const epoch = new Date(2026,6,20);
  const dayIndex = Math.floor((stripTime(new Date()) - epoch) / 86400000);
  const idx = ((dayIndex % batches.length) + batches.length) % batches.length;
  return batches[idx];
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function digitsOnly(p){ return (p||'').replace(/\D/g,''); }
function toE164(p){ let d = digitsOnly(p); if(d.length===10) d = '1'+d; return d ? '+'+d : ''; }
function toWaNumber(p){ let d = digitsOnly(p); if(d.length===10) d = '1'+d; return d; }
function toDisplayIntl(p){ let d = digitsOnly(p); if(d.length===10) d = '1'+d; return d ? '+'+d : ''; }

function parseBirth(b){
  const [y,m,d] = b.split('-').map(Number);
  return {y,m,d};
}
function nextOccurrence(m,d, from){
  let year = from.getFullYear();
  let dt = new Date(year, m-1, d);
  if(dt < stripTime(from)) dt = new Date(year+1, m-1, d);
  return dt;
}
function stripTime(dt){ return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function daysBetween(a,b){ return Math.round((stripTime(b)-stripTime(a))/86400000); }

function loadClients(){
  try{
    const storedVersion = localStorage.getItem('clients_version');
    const raw = localStorage.getItem('clients');
    if(!raw || storedVersion !== SEED_VERSION){
      // Datos nuevos publicados: actualiza la lista automáticamente
      clients = SEED;
      localStorage.setItem('clients', JSON.stringify(clients));
      localStorage.setItem('clients_version', SEED_VERSION);
    }else{
      clients = JSON.parse(raw);
    }
  }catch(e){
    clients = SEED;
  }
}
function saveClients(){
  try{ localStorage.setItem('clients', JSON.stringify(clients)); }
  catch(e){ toast('No se pudo guardar (memoria del navegador llena)'); }
}

function getPhoto(lang){
  const key = lang === 'en' ? 'photo_en' : 'photo_es';
  try{
    const val = localStorage.getItem(key);
    if(val) return val;
  }catch(e){}
  return lang === 'en' ? DEFAULT_PHOTO_EN : DEFAULT_PHOTO_ES;
}

function loadPhotos(){
  document.getElementById('photoPreviewEs').src = getPhoto('es');
  document.getElementById('photoPreviewEn').src = getPhoto('en');
}

function dataURLtoFile(dataurl, filename){
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--){ u8arr[n] = bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

function mapsUrl(addr){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr);
}

function downloadPhoto(dataUrl, filename){
  try{
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    return true;
  }catch(e){ return false; }
}

function fmtMoney(v){
  if(v === null || v === undefined || v === '') return '—';
  return '$' + Number(v).toLocaleString('en-US', {maximumFractionDigits:2});
}

    return `<div class="manual-note">➕ Cliente agregado manualmente — no viene de la base de pólizas original.</div>`;
  }
  const policies = person.policies || [];
  if(!policies.length){
    return `<div class="manual-note">Sin pólizas registradas.</div>`;
  }
  const n = policies.length;
  const label = n === 1 ? '1 póliza' : `${n} pólizas`;
  const items = policies.map(p => `
    <div class="policy-item">
      <div class="policy-item-row"><b>${p.pos}</b><span>fila</span></div>
      <div class="policy-item-body">
        <div class="policy-item-top">
          <span class="policy-item-type">${p.policyType || 'Póliza'}</span>
          <span class="policy-item-quota">${fmtMoney(p.premium)}<span>cuota/mes</span></span>
        </div>
        <div class="policy-item-grid">
          <div><label>N°</label><span>${p.policyNum || '—'}</span></div>
          <div><label>Cobertura</label><span>${fmtMoney(p.coverage)}</span></div>
          <div><label>Pago</label><span>${p.payMethod || '—'}</span></div>
          <div><label>Venta</label><span>${p.saleDate || '—'}</span></div>
        </div>
      </div>
    </div>`).join('');
  return `
    <details class="policy-toggle">
      <summary>📄 Ver detalle<span class="count-pill">${label}</span></summary>
      <div class="policy-list">${items}</div>
    </details>`;
}

function renderCard(person, isToday, age, dayLabel){
  const lang = cardLang[person.id] || person.lang || 'es';
  const message = MESSAGES[lang](person.name.split(' ')[0]);
  const wrap = document.createElement('div');
  wrap.className = 'card' + (isToday ? '' : ' upcoming');
  wrap.innerHTML = `
    <div class="card-top">
      <div>
        <p class="card-name">${person.name}</p>
        <div class="card-sub">${isToday ? 'Cumple ' + age + ' años hoy' : dayLabel}</div>
      </div>
      <div class="age-stamp">${age}</div>
    </div>
    ${person.needsReview ? `<div class="review-warning"><span class="icon">⚠️</span><span><b>Revisar fecha de nacimiento</b> — ${person.reviewNote || 'hay más de una fecha registrada.'}</span></div>` : ''}
    ${policiesTableHTML(person)}
    <div class="lang-toggle">
      <button data-lang="es" class="${lang==='es'?'active':''}">ES</button>
      <button data-lang="en" class="${lang==='en'?'active':''}">EN</button>
    </div>
    <textarea class="msg-box">${message}</textarea>
    <div class="meta-row">
      ${person.phone ? `<span>📞 ${person.phone}</span>` : '<span>Sin teléfono</span>'}
    </div>
    <div class="actions">
      <button class="btn btn-share-sms">📱 SMS con tarjeta</button>
      <button class="btn btn-share-wa">💬 WhatsApp con tarjeta</button>
      ${person.addr ? `<a class="btn btn-map" href="${mapsUrl(person.addr)}" target="_blank" rel="noopener">📍 Mapa</a>` : ''}
      <button class="btn btn-copy">Copiar mensaje</button>
      <div class="hint"><b>SMS:</b> en el celular se abre el panel con la foto ya incluida (solo pega el número en "Para:"). <b>WhatsApp:</b> la foto se descarga sola y se abre el chat con el texto listo — adjunta la foto más reciente de tu galería (WhatsApp en iPhone no acepta bien las fotos que llegan por el panel de compartir).</div>
    </div>
  `;

  const textarea = wrap.querySelector('.msg-box');

  wrap.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.addEventListener('click', ()=>{
      cardLang[person.id] = b.dataset.lang;
      wrap.querySelectorAll('.lang-toggle button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      textarea.value = MESSAGES[b.dataset.lang](person.name.split(' ')[0]);
    });
  });

  wrap.querySelector('.btn-copy').addEventListener('click', async ()=>{
    try{ await navigator.clipboard.writeText(textarea.value); toast('Mensaje copiado'); }
    catch(e){ toast('No se pudo copiar'); }
  });

  async function shareWithCard(fallbackChannel){
    const currentLang = cardLang[person.id] || person.lang || 'es';
    const rawNum = fallbackChannel === 'sms' ? toE164(person.phone) : toWaNumber(person.phone);
    if(!rawNum){ toast('Sin teléfono guardado'); return; }
    const numberToCopy = toDisplayIntl(person.phone) || rawNum;

    if(fallbackChannel === 'wa'){
      // WhatsApp en iOS falla al recibir fotos desde el panel nativo de compartir
      // (bug conocido de WhatsApp, no de esta app). Por eso aquí siempre
      // descargamos la foto directo y abrimos el chat con el texto listo —
      // así es 100% confiable, solo falta adjuntar la foto (la más reciente
      // en la galería) con un toque.
      const photoData = getPhoto(currentLang);
      const downloaded = photoData ? downloadPhoto(photoData, 'feliz-cumpleanos.jpg') : false;
      try{ await navigator.clipboard.writeText(numberToCopy); }catch(e){}
      toast(downloaded
        ? `📥 Foto descargada — pega el número (${numberToCopy}), abre el chat y adjunta la foto más reciente`
        : `Número copiado (${numberToCopy}) — pégalo en WhatsApp`);
      setTimeout(()=>{ window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(textarea.value)}`, '_blank'); }, 400);
      return;
    }

    // Disparamos la copia del número SIN esperarla (no usamos "await" aquí),
    // para que el navegador siga considerando esto un toque directo del
    // usuario y no bloquee el panel nativo de compartir en el siguiente paso.
    let numberCopied = false;
    navigator.clipboard.writeText(numberToCopy).then(()=>{ numberCopied = true; }).catch(()=>{});

    let shared = false;
    let hasNativeShare = false;
    try{
      const photoData = getPhoto(currentLang);
      if(photoData && navigator.canShare){
        const file = dataURLtoFile(photoData, 'feliz-cumpleanos.jpg');
        const shareData = {files:[file], text: textarea.value, title:'Feliz cumpleaños'};
        if(navigator.canShare(shareData)){
          hasNativeShare = true;
          await navigator.share(shareData);
          shared = true;
        }
      }
    }catch(e){ /* cancelado por el usuario o no disponible */ }

    if(shared){
      toast(`✅ Tarjeta enviada — número copiado (${numberToCopy}), pégalo en "Para:"`);
    }else if(hasNativeShare){
      // El usuario canceló el panel de compartir; no insistimos con nada más.
      return;
    }else{
      // Sin panel nativo de compartir (típico en computadora): descargamos
      // la tarjeta para que se adjunte manualmente, y copiamos el mensaje.
      const photoData = getPhoto(currentLang);
      const downloaded = photoData ? downloadPhoto(photoData, 'feliz-cumpleanos.jpg') : false;
      try{ await navigator.clipboard.writeText(textarea.value); }catch(e){}
      if(fallbackChannel === 'sms'){
        toast(downloaded
          ? 'Tarjeta descargada y mensaje copiado — ábrelos en Mensajes desde tu celular'
          : 'Mensaje copiado — pégalo en Mensajes');
        window.location.href = `sms:${rawNum}&body=${encodeURIComponent(textarea.value)}`;
      }else{
        toast(downloaded
          ? 'Tarjeta descargada y mensaje copiado — arrástrala a WhatsApp Web'
          : 'Mensaje copiado — pégalo en WhatsApp');
        window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(textarea.value)}`, '_blank');
      }
    }
  }
  wrap.querySelector('.btn-share-sms').addEventListener('click', ()=> shareWithCard('sms'));
  wrap.querySelector('.btn-share-wa').addEventListener('click', ()=> shareWithCard('wa'));

  return wrap;
}

function render(){
  const today = stripTime(new Date());
  document.getElementById('todayLabel').textContent = today.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});

  const todayList = document.getElementById('todayList');
  const upcomingList = document.getElementById('upcomingList');
  todayList.innerHTML = '';
  upcomingList.innerHTML = '';

  const withNext = clients.filter(c=>c.birth).map(c=>{
    const {y,m,d} = parseBirth(c.birth);
    const next = nextOccurrence(m,d, today);
    const days = daysBetween(today, next);
    const age = next.getFullYear() - y;
    return {...c, days, age};
  }).sort((a,b)=>a.days-b.days);

  const todays = withNext.filter(c=>c.days===0);
  const upcoming = withNext.filter(c=>c.days>0 && c.days<=7);

  document.getElementById('todayCount').textContent = todays.length;

  if(todays.length===0){
    todayList.innerHTML = '<div class="empty">Nadie cumple años hoy. Revisa "Próximos 7 días" para prepararte con tiempo.</div>';
  }else{
    todays.forEach(p=> todayList.appendChild(renderCard(p, true, p.age, '')));
  }

  if(upcoming.length===0){
    upcomingList.innerHTML = '<div class="upcoming-row"><span class="who">Sin cumpleaños próximos</span></div>';
  }else{
    upcoming.forEach(p=>{
      const row = document.createElement('div');
      row.className = 'upcoming-row';
      const dayLabel = p.days===1 ? 'Mañana' : `En ${p.days} días`;
      row.innerHTML = `<span class="who">${p.name}</span><span class="when">${dayLabel} · cumple ${p.age}</span>`;
      row.addEventListener('click', ()=> openClientModal(p));
      upcomingList.appendChild(row);
    });
  }

  renderDirectory(document.getElementById('searchInput').value);
}

function findClientMatch(p){
  const pd = digitsOnly(p.phone);
  if(!pd) return null;
  const nameLower = p.name.trim().toLowerCase();
  let fallback = null;
  for(const c of clients){
    if(digitsOnly(c.phone) === pd){
      if(c.name.trim().toLowerCase() === nameLower) return c;
      if(!fallback) fallback = c;
    }
  }
  return fallback;
}

function renderOutreach(){
  const list = document.getElementById('outreachList');
  if(!list) return;
  list.innerHTML = '';
  const picks = pickDailyOutreach();
  if(!picks.length){
    list.innerHTML = '<div class="empty">Sin sugerencias por ahora.</div>';
    return;
  }
  picks.forEach(p=>{
    const lang = p.lang === 'en' ? 'en' : 'es';
    const msg = CHECKIN_MESSAGES[lang](p.name, p.city);
    const match = findClientMatch(p);
    const card = document.createElement('div');
    card.className = 'outreach-card';
    card.innerHTML = `
      <div class="outreach-top">
        <span class="outreach-name">${p.name}</span>
        <span class="outreach-sub">${p.age} años · ${p.city}</span>
      </div>
      <div class="outreach-sub">${p.phone || 'sin teléfono'}</div>
      ${match ? policiesTableHTML(match) : ''}
      <div class="outreach-actions">
        <button class="btn btn-sms" data-ch="sms">📱 SMS</button>
        <button class="btn btn-share-wa" data-ch="wa">💬 WhatsApp</button>
        <button class="btn btn-copy" data-ch="copy">Copiar</button>
        ${p.addr ? `<a class="btn btn-map" href="${mapsUrl(p.addr)}" target="_blank" rel="noopener">📍 Mapa</a>` : ''}
      </div>`;
    card.querySelector('[data-ch="sms"]').addEventListener('click', async ()=>{
      const num = toE164(p.phone);
      if(!num){ toast('Sin teléfono guardado'); return; }
      window.location.href = `sms:${num}&body=${encodeURIComponent(msg)}`;
    });
    card.querySelector('[data-ch="wa"]').addEventListener('click', async ()=>{
      const num = toWaNumber(p.phone);
      if(!num){ toast('Sin teléfono guardado'); return; }
      window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
    });
    card.querySelector('[data-ch="copy"]').addEventListener('click', async ()=>{
      try{ await navigator.clipboard.writeText(msg); toast('Mensaje copiado'); }
      catch(e){ toast('No se pudo copiar'); }
    });
    list.appendChild(card);
  });
}

function renderDirectory(filter=''){
  const dir = document.getElementById('dirList');
  dir.innerHTML = '';
  document.getElementById('dirCount').textContent = clients.length;
  const q = filter.trim().toLowerCase();
  const list = clients.filter(c=>!q || c.name.toLowerCase().includes(q)).slice(0,150);
  list.forEach(c=>{
    const row = document.createElement('div');
    row.className = 'dir-row';
    const nPol = (c.policies || []).length;
    const polTxt = c.manual ? 'agregado a mano' : `${nPol} póliza${nPol!==1?'s':''}`;
    row.innerHTML = `<div><div class="who">${c.needsReview ? '⚠️ ' : ''}${c.name}</div><div class="sub">${c.phone||'sin teléfono'} · ${c.birth||'sin fecha'} · ${polTxt}</div></div><button class="dir-del">Eliminar</button>`;
    row.addEventListener('click', ()=> openClientModal(c));
    row.querySelector('.dir-del').addEventListener('click', (e)=>{
      e.stopPropagation();
      clients = clients.filter(x=>x.id!==c.id);
      saveClients();
      render();
    });
    dir.appendChild(row);
  });
}

function openClientModal(c){
  const overlay = document.getElementById('clientModalOverlay');
  const card = document.getElementById('clientModalCard');
  const langLabel = c.lang === 'en' ? 'English' : 'Español';
  card.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <p class="modal-name">${c.name}</p>
    ${c.needsReview ? `<div class="review-warning"><span class="icon">⚠️</span><span><b>Revisar fecha de nacimiento</b> — ${c.reviewNote || 'hay más de una fecha registrada.'}</span></div>` : ''}
    ${policiesTableHTML(c)}
    <div class="modal-field"><label>Teléfono</label><span>${c.phone || 'Sin teléfono'}</span></div>
    <div class="modal-field"><label>Fecha de nacimiento</label><span>${c.birth || 'Sin fecha'}</span></div>
    <div class="modal-field"><label>Idioma</label><span>${langLabel}</span></div>
    <div class="modal-field"><label>Dirección</label><span>${c.addr || 'Sin dirección'}</span></div>
    <div class="actions" style="margin-top:18px;">
      <button class="btn btn-share-sms" id="modalShareSms">📱 SMS con tarjeta</button>
      <button class="btn btn-share-wa" id="modalShareWa">💬 WhatsApp con tarjeta</button>
      ${c.addr ? `<a class="btn btn-map" href="${mapsUrl(c.addr)}" target="_blank" rel="noopener">📍 Mapa</a>` : ''}
    </div>
  `;
  const lang = c.lang === 'en' ? 'en' : 'es';
  const message = MESSAGES[lang](c.name.split(' ')[0]);
  card.querySelector('#modalCloseBtn').addEventListener('click', closeClientModal);
  async function modalShareWithCard(fallbackChannel){
    const rawNum = fallbackChannel === 'sms' ? toE164(c.phone) : toWaNumber(c.phone);
    if(!rawNum){ toast('Sin teléfono guardado'); return; }
    const numberToCopy = toDisplayIntl(c.phone) || rawNum;

    if(fallbackChannel === 'wa'){
      const photoData = getPhoto(lang);
      const downloaded = photoData ? downloadPhoto(photoData, 'feliz-cumpleanos.jpg') : false;
      try{ await navigator.clipboard.writeText(numberToCopy); }catch(e){}
      toast(downloaded
        ? `📥 Foto descargada — pega el número (${numberToCopy}), abre el chat y adjunta la foto más reciente`
        : `Número copiado (${numberToCopy}) — pégalo en WhatsApp`);
      setTimeout(()=>{ window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(message)}`, '_blank'); }, 400);
      return;
    }

    navigator.clipboard.writeText(numberToCopy).catch(()=>{});

    let shared = false;
    let hasNativeShare = false;
    try{
      const photoData = getPhoto(lang);
      if(photoData && navigator.canShare){
        const file = dataURLtoFile(photoData, 'feliz-cumpleanos.jpg');
        const shareData = {files:[file], text: message, title:'Feliz cumpleaños'};
        if(navigator.canShare(shareData)){
          hasNativeShare = true;
          await navigator.share(shareData);
          shared = true;
        }
      }
    }catch(e){ /* cancelado por el usuario o no disponible */ }

    if(shared){
      toast(`✅ Tarjeta enviada — número copiado (${numberToCopy}), pégalo en "Para:"`);
    }else if(hasNativeShare){
      return;
    }else{
      const photoData = getPhoto(lang);
      const downloaded = photoData ? downloadPhoto(photoData, 'feliz-cumpleanos.jpg') : false;
      try{ await navigator.clipboard.writeText(message); }catch(e){}
      if(fallbackChannel === 'sms'){
        toast(downloaded
          ? 'Tarjeta descargada y mensaje copiado — ábrelos en Mensajes desde tu celular'
          : 'Mensaje copiado — pégalo en Mensajes');
        window.location.href = `sms:${rawNum}&body=${encodeURIComponent(message)}`;
      }else{
        toast(downloaded
          ? 'Tarjeta descargada y mensaje copiado — arrástrala a WhatsApp Web'
          : 'Mensaje copiado — pégalo en WhatsApp');
        window.open(`https://wa.me/${rawNum}?text=${encodeURIComponent(message)}`, '_blank');
      }
    }
  }
  card.querySelector('#modalShareSms').addEventListener('click', ()=> modalShareWithCard('sms'));
  card.querySelector('#modalShareWa').addEventListener('click', ()=> modalShareWithCard('wa'));
  overlay.classList.add('show');
}
function closeClientModal(){
  document.getElementById('clientModalOverlay').classList.remove('show');
}
document.getElementById('clientModalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'clientModalOverlay') closeClientModal();
});

document.getElementById('searchInput').addEventListener('input', (e)=> renderDirectory(e.target.value));

function wireUpload(btnId, inputId, storageKey, previewId){
  document.getElementById(btnId).addEventListener('click', ()=> document.getElementById(inputId).click());
  document.getElementById(inputId).addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        localStorage.setItem(storageKey, reader.result);
        toast('Tarjeta actualizada');
      }catch(e){
        toast('La foto es muy pesada para guardarla en el navegador — prueba una más liviana');
      }
      document.getElementById(previewId).src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
wireUpload('uploadBtnEs','photoInputEs','photo_es','photoPreviewEs');
wireUpload('uploadBtnEn','photoInputEn','photo_en','photoPreviewEn');

window.addEventListener('error', (e)=>{
  const banner = document.getElementById('errorBanner');
  if(banner){
    banner.style.display = 'block';
    banner.textContent = 'Hubo un error cargando la app: ' + (e.message || 'desconocido') + '.';
  }
});

(function init(){
  try{
    loadClients();
    loadPhotos();
    render();
    renderOutreach();
  }catch(err){
    const banner = document.getElementById('errorBanner');
    if(banner){
      banner.style.display = 'block';
      banner.textContent = 'Hubo un error cargando la app: ' + (err && err.message ? err.message : err);
    }
  }
})();
